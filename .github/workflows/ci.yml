name: PiWorker-OS Sovereign CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    # --- Node.js Strategy ---
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm install --legacy-peer-deps
      
    - name: TypeScript Validation
      run: npx tsc --noEmit

    # --- Go Sovereign Strategy ---
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'
        cache: true
        cache-dependency-path: go.sum

    - name: Build Sovereign Engine (Static Binary)
      run: |
        chmod +x scripts/build-sovereign-engine.sh
        ./scripts/build-sovereign-engine.sh

    # --- Final Build & Asset Verification ---
    - name: Full Sovereign Build
      run: npm run build:sovereign

  sandbox-audit:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Build Sovereign Engine Container
      run: docker build -t sovereign-engine:latest sidecar/sovereign-engine/
      
    - name: Run Sovereign Engine Container
      run: |
        docker run -d \
          --name engine \
          -p 50051:50051 \
          -e SOVEREIGN_AUTH_TOKEN=${{ secrets.SOVEREIGN_AUTH_TOKEN }} \
          -e AGENT_SYSTEM_SECRET=${{ secrets.AGENT_SYSTEM_SECRET }} \
          sovereign-engine:latest
        sleep 5 # Allow engine to wake up

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm install --legacy-peer-deps
      
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium

    - name: Validate required audit paths
      run: |
        set -euo pipefail
        REQUIRED_PATHS=(
          "playwright.config.ts.bak"
          "tests.bak/sandbox-audit.spec.ts"
        )
        for path in "${REQUIRED_PATHS[@]}"; do
          if [ ! -e "$path" ]; then
            echo "::error::Required path not found: $path"
            exit 1
          fi
        done
      
    - name: Run The Sandbox Audit
    - name: Run The Sandbox Audit
      run: npx playwright test tests/sandbox-audit.spec.ts --config=playwright.config.ts
      env:
        SOVEREIGN_ENGINE_URL: localhost:50051
        SOVEREIGN_AUTH_TOKEN: ${{ secrets.SOVEREIGN_AUTH_TOKEN }}
        AGENT_SYSTEM_SECRET: ${{ secrets.AGENT_SYSTEM_SECRET }}
