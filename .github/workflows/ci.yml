name: PiWorker-OS Sovereign CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  release-gate:
    name: Release Gate (build, security, e2e, artifacts)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: npm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Typecheck (Node)
        run: npm run typecheck

      - name: Build (Node)
        run: npm run build:sovereign

      - name: Build (Go CLI)
        run: npm run build:cli

      - name: Build Sovereign Engine (Go)
        run: |
          chmod +x scripts/build-sovereign-engine.sh
          ./scripts/build-sovereign-engine.sh

      - name: Secret scan (Secretlint)
        run: npx secretlint "**/*"

      - name: Vulnerability scan (Trivy)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          format: table
          exit-code: 1

      - name: Install Playwright browsers
        run: npm run playwright:install:chromium

      - name: Run critical E2E suite
        run: npm run playwright:test:sandbox
        env:
          SOVEREIGN_ENGINE_URL: localhost:50051
          SOVEREIGN_AUTH_TOKEN: ${{ secrets.SOVEREIGN_AUTH_TOKEN }}
          AGENT_SYSTEM_SECRET: ${{ secrets.AGENT_SYSTEM_SECRET }}

      - name: Artifact sanity checks
        run: |
          test -s bin/piworker-cli
          test -d .next
          test -f sidecar/sovereign-engine/Dockerfile

      - name: Validate deploy secrets/config
        id: validate_config
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          verdict="PASS"
          details="All required deployment secrets are configured."

          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            for key in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID; do
              if [ -z "${!key}" ]; then
                verdict="FAIL"
                details="Missing required deploy secret: ${key}"
                break
              fi
            done
          else
            details="Skipped strict secret validation for non-main or PR context."
          fi

          echo "verdict=${verdict}" >> "$GITHUB_OUTPUT"
          echo "details=${details}" >> "$GITHUB_OUTPUT"

          if [ "$verdict" = "FAIL" ]; then
            echo "$details"
            exit 1
          fi

      - name: Generate release checklist
        id: checklist
        run: |
          readiness="READY"
          if [ "${{ steps.validate_config.outputs.verdict }}" != "PASS" ]; then
            readiness="BLOCKED"
          fi

          cat > release-checklist.md <<EOF
          # Release Checklist

          ## Passing test matrix
          - ✅ Node typecheck
          - ✅ Node build
          - ✅ Go build (CLI + sovereign engine)
          - ✅ Security scans (Secretlint + Trivy)
          - ✅ Critical E2E suite
          - ✅ Artifact sanity checks

          ## Secret/config validation result
          - Verdict: ${{ steps.validate_config.outputs.verdict }}
          - Details: ${{ steps.validate_config.outputs.details }}

          ## Deployment readiness verdict
          - ${readiness}
          EOF

      - name: Upload release checklist artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-checklist
          path: release-checklist.md
          if-no-files-found: error
