name: PR Required Checks

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

concurrency:
  group: required-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  required:
    name: required / build-test-security-baseline
    uses: ./.github/workflows/reusable-required-checks.yml
    secrets: inherit
