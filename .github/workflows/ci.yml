name: PiWorker-OS Sovereign CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    # --- Node.js Strategy ---
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm install --legacy-peer-deps
      
    - name: TypeScript Validation
      run: npx tsc --noEmit

    # --- Go Sovereign Strategy ---
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'
        cache: true
        cache-dependency-path: sidecar/sovereign-engine/go.sum

    - name: Build Sovereign Engine (Static Binary)
      run: |
        chmod +x scripts/build-sovereign-engine.sh
        ./scripts/build-sovereign-engine.sh

    # --- Final Build & Asset Verification ---
    - name: Full Sovereign Build
      run: npm run build:sovereign

  sandbox-audit:
    runs-on: ubuntu-latest
    needs: build
    
    services:
      sovereign-engine:
        image: moeabdelaziz007/piworker-sovereign-engine:latest
        ports:
          - 50051:50051
        env:
          SOVEREIGN_AUTH_TOKEN: ${{ secrets.SOVEREIGN_AUTH_TOKEN }}
          AGENT_SYSTEM_SECRET: ${{ secrets.AGENT_SYSTEM_SECRET }}

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm install --legacy-peer-deps
      
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium
      
    - name: Run The Sandbox Audit
      run: npx playwright test tests/sandbox-audit.spec.ts
      env:
        SOVEREIGN_ENGINE_URL: localhost:50051
        SOVEREIGN_AUTH_TOKEN: ${{ secrets.SOVEREIGN_AUTH_TOKEN }}
        AGENT_SYSTEM_SECRET: ${{ secrets.AGENT_SYSTEM_SECRET }}
