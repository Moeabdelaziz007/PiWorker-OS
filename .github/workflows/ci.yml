name: PiWorker-OS Sovereign CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build:
    name: Build & Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        # Pin action versions to a vetted release tag for supply-chain security and reproducible runs.
        uses: actions/checkout@v4

      - name: Setup Node.js
        # Pin action versions to a vetted release tag for supply-chain security and reproducible runs.
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: npm

      - name: Verify npm lockfile integrity
        run: npm ci --ignore-scripts --no-audit --no-fund --legacy-peer-deps

      - name: Enforce npm audit policy (fail on high/critical)
        run: npm audit --audit-level=high --omit=dev

      - name: Targeted Performance SLO Profiling
        run: npm run profile:slo

      - name: Contract Sync Validation
        run: npm run contracts:check

      - name: Setup Go
        # Pin action versions to a vetted release tag for supply-chain security and reproducible runs.
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
          cache-dependency-path: go.sum

      - name: Verify Go module integrity
        run: go mod verify

      - name: Enforce Go vulnerability policy
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Typecheck (Node)
        run: npm run typecheck

      - name: Build (Node)
        run: npm run build:sovereign

      - name: Build (Go CLI)
        run: npm run build:cli

      - name: Build Sovereign Engine (Go)
        run: |
          chmod +x scripts/build-sovereign-engine.sh
          ./scripts/build-sovereign-engine.sh

      - name: Secret scan (Secretlint)
        run: npx secretlint "**/*"

      - name: Vulnerability scan (Trivy)
        # Pin action versions to a vetted release tag for supply-chain security and reproducible runs.
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          format: table
          exit-code: 1

      - name: Artifact sanity checks
        run: |
          test -s bin/piworker-cli
          test -d .next
          test -f sidecar/sovereign-engine/Dockerfile

      - name: Validate deploy secrets/config
        id: validate_config
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          verdict="PASS"
          details="All required deployment secrets are configured."

          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            for key in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID; do
              if [ -z "${!key}" ]; then
                verdict="FAIL"
                details="Missing required deploy secret: ${key}"
                break
              fi
            done
          else
            details="Skipped strict secret validation for non-main or PR context."
          fi

          echo "verdict=${verdict}" >> "$GITHUB_OUTPUT"
          echo "details=${details}" >> "$GITHUB_OUTPUT"

          if [ "$verdict" = "FAIL" ]; then
            echo "$details"
            exit 1
          fi

      - name: Generate release checklist
        id: checklist
        run: |
          readiness="READY"
          if [ "${{ steps.validate_config.outputs.verdict }}" != "PASS" ]; then
            readiness="BLOCKED"
          fi

          cat > release-checklist.md <<EOF
          # Release Checklist

          ## Passing test matrix
          - ✅ Node typecheck
          - ✅ Node build
          - ✅ Go build (CLI + sovereign engine)
          - ✅ Security scans (Secretlint + Trivy)
          - ✅ Targeted Performance SLO Profiling
          - ✅ Contract Sync Validation
          - ✅ Artifact sanity checks

          ## Secret/config validation result
          - Verdict: ${{ steps.validate_config.outputs.verdict }}
          - Details: ${{ steps.validate_config.outputs.details }}

          ## Deployment readiness verdict
          - ${readiness}
          EOF

      - name: Upload release checklist artifact
        # Pin action versions to a vetted release tag for supply-chain security and reproducible runs.
        uses: actions/upload-artifact@v4
        with:
          name: release-checklist
          path: release-checklist.md
          if-no-files-found: error

  sandbox-audit:
    name: Tiered Test Gates (T1-T4)
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
          cache-dependency-path: go.sum

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Tier 1 - Static checks
        run: npm run test:tier1

      - name: Tier 2 - Unit tests
        run: npm run test:tier2

      - name: Tier 3 - Node↔Go bridge handshake
        run: npm run test:tier3
        env:
          SOVEREIGN_AUTH_TOKEN: ${{ secrets.SOVEREIGN_AUTH_TOKEN }}
          AGENT_SYSTEM_SECRET: ${{ secrets.AGENT_SYSTEM_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Install Playwright browsers
        run: npm run playwright:install:chromium

      - name: Tier 4 - Playwright E2E final gate
        run: npm run test:tier4
        env:
          SOVEREIGN_ENGINE_URL: localhost:50051
          SOVEREIGN_AUTH_TOKEN: ${{ secrets.SOVEREIGN_AUTH_TOKEN }}
          AGENT_SYSTEM_SECRET: ${{ secrets.AGENT_SYSTEM_SECRET }}
