name: Reusable Required Checks

on:
  workflow_call:

jobs:
  build_test_security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: npm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Typecheck (Node)
        run: npm run typecheck

      - name: Build (Node)
        run: npm run build:sovereign

      - name: Build (Go CLI)
        run: npm run build:cli

      - name: Build Sovereign Engine (Go)
        run: |
          chmod +x scripts/build-sovereign-engine.sh
          ./scripts/build-sovereign-engine.sh

      - name: Security baseline (Secretlint)
        run: npx secretlint "**/*"

      - name: Security baseline (Trivy filesystem scan)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          format: table
          exit-code: 1

      - name: Install Playwright browsers
        run: npm run playwright:install:chromium

      - name: Run critical E2E suite
        run: npm run playwright:test:sandbox
        env:
          SOVEREIGN_ENGINE_URL: localhost:50051
          SOVEREIGN_AUTH_TOKEN: ${{ secrets.SOVEREIGN_AUTH_TOKEN }}
          AGENT_SYSTEM_SECRET: ${{ secrets.AGENT_SYSTEM_SECRET }}

      - name: Artifact sanity checks
        run: |
          test -s bin/piworker-cli
          test -d .next
          test -f sidecar/sovereign-engine/Dockerfile
