syntax = "proto3";

package sovereign;

option go_package = "./internal/pb";

// The Sovereign Engine Service
service SovereignService {
  // Quantum Mirror Simulation (Now Gemini-Powered)
  rpc RequestSimulation(SimulationRequest) returns (SimulationResponse);
  
  // Financial Escrow Lock & Ledger Verification
  rpc LockEscrow(EscrowRequest) returns (EscrowResponse);
  rpc VerifyTransaction(VerifyTxRequest) returns (VerifyTxResponse);
  rpc CommitPayment(PaymentRequest) returns (PaymentResponse);

  // Embodied Intent Bridge (π0.7 Physical Layer)
  rpc SendEmbodiedIntent(EmbodiedIntent) returns (IntentResponse);

  // Ring 3: Neural-Isolated Sandbox Execution
  rpc ExecutePlugin(PluginRequest) returns (PluginResponse);

  // Pattern 7: Neural Memory Mesh (Collective Intelligence)
  rpc StoreMemory(MemoryInsight) returns (MemoryResponse);
  rpc QueryMemory(MemoryQuery) returns (MemoryList);
  
  // Pi-402 Agentic Payment Protocol
  rpc AuthorizeAgentSubWallet(SubWalletRequest) returns (SubWalletResponse);
  rpc ProcessAgentPayment(AgentPaymentRequest) returns (AgentPaymentResponse);

  // KYA & AIX Identity Protocol
  rpc IssueAIXPassport(KYARequest) returns (AIXPassport);
  rpc VerifyAIXPassport(VerifyKYARequest) returns (VerifyKYAResponse);

  // Intent-Based Escrow & Bounties
  rpc CreateIntentBounty(IntentBountyRequest) returns (IntentBountyResponse);
  rpc ResolveIntentBounty(ResolveBountyRequest) returns (ResolveBountyResponse);
  rpc GetActiveBounties(BountyQuery) returns (BountyList);
}

// --- Simulation Logic ---

message SimulationRequest {
  string goal_id = 1;
  int32 instances = 2;
  float complexity = 3;
  repeated string personas = 4;
  string model_version = 5; // e.g. "gemini-1.5-pro"
}

message SimulationResponse {
  string goal_id = 1;
  float predicted_roi = 2;
  float risk_score = 3;
  string strategy_recommendation = 4;
  GeminiReasoning reasoning = 5;
  float estimated_revenue_usd = 6;
}

message GeminiReasoning {
  string logic_chain = 1;
  repeated string critical_risks = 2;
  repeated string opportunities = 3;
  string confidence_score = 4;
}

// --- Physical Layer ---

message EmbodiedIntent {
  string intent_id = 1;
  string agent_id = 2;
  string subtask_language = 3; 
  map<string, string> execution_metadata = 4;
  string control_mode = 5;
  repeated bytes visual_subgoals = 6;
  // goal and persona are passed to the hybrid reasoning layer in
  // SendEmbodiedIntent (sidecar/sovereign-engine/pkg/server/server.go).
  string goal = 7;
  string persona = 8;
}

message IntentResponse {
  bool accepted = 1;
  string status_message = 2;
  string tracking_id = 3;
}

// --- Financial Layer ---

message EscrowRequest {
  string tx_id = 1;
  double amount_pi = 2;
  string target_wallet = 3;
}

message EscrowResponse {
  bool locked = 1;
  string escrow_address = 2;
}

message VerifyTxRequest {
  string tx_id = 1;
  string expected_receiver = 2;
  double expected_amount = 3;
}

message VerifyTxResponse {
  bool verified = 1;
  string status_message = 2;
  string sender_address = 3;
}

message PaymentRequest {
  string recipient_id = 1;
  double amount_pi = 2;
  string agent_auth_token = 3;
  string priority = 4;
}

message PaymentResponse {
  bool success = 1;
  string tx_id = 2;
  string explorer_url = 3;
  string error_message = 4;
}

// --- Sandbox Layer ---

message PluginRequest {
  string plugin_id = 1;
  string source_code = 2;
  map<string, string> env_vars = 3;
  repeated string allowed_capabilities = 4;
  string signature = 5;
}

message PluginResponse {
  string plugin_id = 1;
  bool success = 2;
  string output_json = 3;
  string error_message = 4;
  int64 execution_time_ms = 5;
  repeated string logs = 6;
}

// --- Memory Layer ---

message MemoryInsight {
  string id = 1;
  string agent_id = 2;
  string topic = 3;
  string data_json = 4;
  string signature = 5;
  string timestamp = 6;
  float relevance = 7;
}

message MemoryResponse {
  bool success = 1;
  string memory_id = 2;
}

message MemoryQuery {
  string topic = 1;
  string agent_id = 2;
  string semantic_query = 3;
}

// --- Pi-402 Agentic Payment Layer ---

message SubWalletRequest {
  string agent_id = 1;
  bytes master_seed_cipher = 2; // AES-256-GCM encrypted master seed
}

message SubWalletResponse {
  string agent_id = 1;
  string sub_wallet_address = 2;
  string public_key_hex = 3;
}

message AgentPaymentRequest {
  string source_agent_id = 1;
  string target_id = 2; // Can be another agent or a service address
  double amount_pi = 3;
  string memo = 4;
  string signature = 5; // Signed by agent's session key
}

message AgentPaymentResponse {
  bool success = 1;
  string tx_hash = 2;
  string error_message = 3;
  double remaining_balance = 4;
}

message MemoryList {
  repeated MemoryInsight insights = 1;
}

// --- KYA & AIX Identity Layer ---

message KYARequest {
  string agent_id = 1;
  string owner_pi_id = 2;
  string kyc_proof_token = 3; // From Pi KYC service
}

message AIXPassport {
  string agent_id = 1;
  string owner_pi_id = 2;
  string issuance_date = 3;
  string expiry_date = 4;
  string kyc_status = 5;
  string zkp_commitment = 6;
  string signature = 7; // Sovereign Engine Signature
  map<string, string> attributes = 8;
}

message VerifyKYARequest {
  AIXPassport passport = 1;
  string challenge = 2;
  string agent_signature = 3; // Signature of the challenge by the agent
}

message VerifyKYAResponse {
  bool valid = 1;
  string verification_message = 2;
  string owner_verification_level = 3;
}

// --- Intent-Based Escrow & Bounties ---

message IntentBountyRequest {
  string creator_id = 1;
  string intent_description = 2;
  double amount_pi = 3;
  string expiry = 4;
  map<string, string> constraints = 5;
}

message IntentBountyResponse {
  string bounty_id = 1;
  string escrow_address = 2;
  bool success = 3;
}

message ResolveBountyRequest {
  string bounty_id = 1;
  string solver_id = 2;
  string proof_data = 3;
  string solver_signature = 4;
}

message ResolveBountyResponse {
  bool released = 1;
  string tx_hash = 2;
  string status = 3;
}

message BountyQuery {
  string creator_id = 1;
  string status = 2;
}

message BountyList {
  repeated IntentBounty bounties = 1;
}

message IntentBounty {
  string bounty_id = 1;
  string creator_id = 2;
  string description = 3;
  double amount_pi = 4;
  string status = 5;
}
