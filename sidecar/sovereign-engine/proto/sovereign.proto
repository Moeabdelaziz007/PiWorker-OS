syntax = "proto3";

package sovereign;

option go_package = "./internal/pb";

// The Sovereign Engine Service
service SovereignService {
  // Quantum Mirror Simulation
  rpc RequestSimulation(SimulationRequest) returns (SimulationResponse);
  
  // Financial Escrow Lock
  rpc LockEscrow(EscrowRequest) returns (EscrowResponse);

  // NEW: Embodied Intent Bridge (π0.7 Physical Layer)
  rpc SendEmbodiedIntent(EmbodiedIntent) returns (IntentResponse);
}

// --- Embodied AI (π0.7) Messages ---

message EmbodiedIntent {
  string intent_id = 1;
  string agent_id = 2;
  
  // Multimodal Instruction
  string subtask_language = 3; 
  
  // Execution Metadata (Speed, Precision, Quality)
  map<string, string> execution_metadata = 4;
  
  // Control Mode: e.g., "autonomous", "teleop", "safety_halt"
  string control_mode = 5;
  
  // Stream of Visual Subgoals (Image data/feature vectors)
  repeated bytes visual_subgoals = 6;
}

message IntentResponse {
  bool accepted = 1;
  string status_message = 2;
  string tracking_id = 3;
}

// --- Legacy Simulation Messages ---

message SimulationRequest {
  string goal_id = 1;
  int32 instances = 2;
  float complexity = 3;
  repeated string personas = 4;
}

message SimulationResponse {
  string goal_id = 1;
  float predicted_roi = 2;
  float risk_score = 3;
  string strategy_recommendation = 4;
}

// --- Financial Messages ---

message EscrowRequest {
  string tx_id = 1;
  double amount_pi = 2;
  string target_wallet = 3;
}

message EscrowResponse {
  bool locked = 1;
  string escrow_address = 2;
}

message VerifyTxRequest {
  string tx_id = 1;
  string expected_receiver = 2;
  double expected_amount = 3;
}

message VerifyTxResponse {
  bool verified = 1;
  string status_message = 2;
  string sender_address = 3;
}
